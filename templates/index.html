<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Astram Command Center</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        
        body { 
            background: linear-gradient(135deg, #f0f4f8 0%, #d9e2ec 100%); 
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; padding: 20px;
        }

        .dashboard-card { 
            background: #ffffff; 
            padding: 40px; 
            border-radius: 16px; 
            box-shadow: 0 10px 40px rgba(40, 116, 240, 0.1); 
            max-width: 550px; width: 100%; 
            border-top: 6px solid #2874F0; /* Flipkart Blue */
        }

        .header { text-align: center; margin-bottom: 30px; }
        .header h2 { color: #102a43; font-weight: 800; font-size: 24px; letter-spacing: -0.5px; }
        .header p { color: #627d98; font-size: 14px; margin-top: 5px; font-weight: 600; }

        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; font-size: 13px; font-weight: 600; color: #334e68; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px;}
        
        .row { display: flex; gap: 15px; }
        .row .input-group { flex: 1; }

        input, select { 
            width: 100%; padding: 12px 15px; 
            border-radius: 8px; border: 1px solid #bcccdc; 
            background-color: #f0f4f8; font-size: 15px; color: #102a43; 
            transition: all 0.3s ease; outline: none;
        }
        input:focus, select:focus { border-color: #2874F0; background-color: #ffffff; box-shadow: 0 0 0 3px rgba(40, 116, 240, 0.15); }

        .btn-predict { 
            margin-top: 10px; width: 100%; 
            background-color: #FFE500; /* Flipkart Yellow */
            color: #102a43; border: none; padding: 15px; 
            font-size: 16px; font-weight: 800; border-radius: 8px; 
            cursor: pointer; transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(255, 229, 0, 0.3);
        }
        .btn-predict:hover { background-color: #f5db00; transform: translateY(-2px); box-shadow: 0 6px 20px rgba(255, 229, 0, 0.4); }

        .result-box { 
            margin-top: 30px; padding: 25px; 
            background-color: #ffffff; border-radius: 12px; 
            text-align: center; display: none;
            border: 2px solid transparent;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            transition: all 0.4s ease;
        }

        .duration-val { font-size: 36px; font-weight: 800; color: #102a43; margin-bottom: 5px; }
        .duration-label { font-size: 14px; color: #627d98; font-weight: 600; text-transform: uppercase; letter-spacing: 1px;}
        .action-text { margin-top: 15px; font-size: 15px; font-weight: 600; padding-top: 15px; border-top: 1px solid #e4e7eb;}
    </style>
</head>
<body>

<div class="dashboard-card">
    <div class="header">
        <h2>Astram Command Center</h2>
        <p>Proactive Congestion Forecasting AI</p>
    </div>
    
    <div class="row">
        <div class="input-group">
            <label>Latitude</label>
            <input type="text" id="lat" value="12.9716">
        </div>
        <div class="input-group">
            <label>Longitude</label>
            <input type="text" id="lon" value="77.5946">
        </div>
    </div>

    <div class="row">
        <div class="input-group">
            <label>Time (Hour 0-23)</label>
            <input type="number" id="hour" min="0" max="23" value="18">
        </div>
        <div class="input-group">
            <label>Priority Level</label>
            <select id="priority">
                <option value="High">High</option>
                <option value="Medium">Medium</option>
                <option value="Low">Low</option>
            </select>
        </div>
    </div>

    <div class="input-group">
        <label>Primary Event Cause</label>
        <select id="cause">
            <option value="vehicle_breakdown">Vehicle Breakdown</option>
            <option value="public_event">Public Event / Rally</option>
            <option value="water_logging">Water Logging</option>
            <option value="accident">Major Accident</option>
        </select>
    </div>

    <button class="btn-predict" onclick="makePrediction()">Forecast Impact Timeline</button>

    <div class="result-box" id="result">
        <div class="duration-label">Estimated Disruption</div>
        <div class="duration-val" id="duration_text">0 mins</div>
        <div class="action-text" id="action_text"></div>
    </div>
</div>

<script>
    async function makePrediction() {
        // Simple loading state
        const btn = document.querySelector('.btn-predict');
        btn.innerText = "Processing Data...";
        
        const data = {
            latitude: document.getElementById('lat').value,
            longitude: document.getElementById('lon').value,
            hour: document.getElementById('hour').value,
            cause: document.getElementById('cause').value,
            priority: document.getElementById('priority').value,
            corridor: "Unknown"
        };

        try {
            const response = await fetch('/predict', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });

            const result = await response.json();
            
            // UI Updates
            const resultBox = document.getElementById('result');
            resultBox.style.display = 'block';
            resultBox.style.borderColor = result.alert_color; // Dynamic border color
            
            document.getElementById('duration_text').innerText = result.predicted_duration + " Mins";
            document.getElementById('duration_text').style.color = result.alert_color;
            
            document.getElementById('action_text').innerText = result.action_plan;
            document.getElementById('action_text').style.color = result.alert_color;
        } catch (error) {
            alert("Error connecting to the ML Backend. Ensure app.py is running.");
        } finally {
            btn.innerText = "Forecast Impact Timeline"; // Reset button
        }
    }
</script>

</body>
</html>
